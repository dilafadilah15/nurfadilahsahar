<!DOCTYPE html>
<html lang="id">

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <img src="logo1.png" alt="Logo BelajarKuy" width="50">
            <span>BelajarKuy</span>
        </div>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="kursus.html">Kursus</a>
            <a href="#">Tentang</a>
            <a href="login.html">Login</a>
        </nav>

    <!-- FORM LOGIN -->
    <section class="login-container">
        <h2>Masuk ke Akun Kamu</h2>
        <p>Selamat datang kembali! Silakan login untuk melanjutkan belajar.</p>

        <form>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="contoh@email.com">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password">

            <button type="submit">Masuk</button>
        </form>

        <p>Belum punya akun? <a href="#">Daftar di sini</a></p>
    </section>
